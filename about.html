<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Our Story — BUECON</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/variables.css"/>
  <link rel="stylesheet" href="css/reset.css"/>
  <link rel="stylesheet" href="css/base.css"/>
  <link rel="stylesheet" href="css/navbar.css"/>
  <link rel="stylesheet" href="css/about.css"/>
  <link rel="stylesheet" href="css/footer.css"/>
  <style>
    body { padding-top: 100px; background: var(--navy-deep); min-height: 100vh; }
    .page-hero {
      padding: 80px 0 60px; text-align: center;
      background: linear-gradient(180deg, var(--navy-deep) 0%, var(--navy) 100%);
      border-bottom: 1px solid rgba(197,164,109,0.08);
    }
    .page-hero h1 {
      font-family: var(--font-serif);
      font-size: clamp(2.5rem, 5vw, 4rem);
      font-weight: 600; color: var(--white); line-height: 1.1; margin-top: 12px;
    }
    .page-hero h1 em { font-style: italic; color: var(--gold); }
    .breadcrumb {
      display: flex; align-items: center; justify-content: center;
      gap: 8px; margin-top: 16px;
      font-size: 0.75rem; color: var(--silver-dim); letter-spacing: 0.1em;
    }
    .breadcrumb a { color: var(--gold); text-decoration: none; }
    .nav-links a[href="about.html"] { color: var(--gold) !important; }
    .nav-links a[href="about.html"]::after { width: 100% !important; }
  </style>
</head>
<body>
  <nav id="navbar">
    <a href="index.html" class="nav-logo">BUECON</a>
    <ul class="nav-links">
      <li><a href="about.html">About</a></li>
      <li><a href="products.html">Products</a></li>
      <li><a href="why.html">Why Us</a></li>
      <li><a href="mission.html">Mission</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="reviews.html">Reviews</a></li>
    </ul>
    <a href="contact.html" class="nav-cta">Get in Touch</a>
    <button class="nav-hamburger" id="hamburger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </nav>
  <div class="mobile-menu" id="mobileMenu">
    <ul>
      <li><a href="about.html" class="mobile-link">About</a></li>
      <li><a href="products.html" class="mobile-link">Products</a></li>
      <li><a href="why.html" class="mobile-link">Why Us</a></li>
      <li><a href="mission.html" class="mobile-link">Mission</a></li>
      <li><a href="contact.html" class="mobile-link">Contact</a></li>
    </ul>
  </div>

  <div class="page-hero">
    <div class="container">
      <span class="section-label">About</span>
      <h1>Our Story</h1>
      <div class="breadcrumb">
        <a href="index.html">Home</a> <span>›</span> <span>Our Story</span>
      </div>
    </div>
  </div>

  <div id="about-content"></div>

  <footer id="footer"><div id="footer-content"></div></footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/data.js"></script>
  <script src="js/sections/footer.js"></script>
  <script src="js/sections/about.js"></script>
  <script src="js/animations.js"></script>
  <script src="js/visitor-tracker.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await loadBueconData();
      if(typeof renderAbout === 'function') renderAbout();
      renderFooter();
      Animations.init();
    });
  </script>
</body>
