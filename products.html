<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Products — BUECON</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/navbar.css" />
  <link rel="stylesheet" href="css/products.css" />
  <link rel="stylesheet" href="css/focus-mode.css" />
  <link rel="stylesheet" href="css/assistant.css" />
  <link rel="stylesheet" href="css/footer.css" />
</head>
<body>

  <!-- ═══ NAVBAR ═══ -->
  <nav id="navbar">
    <div class="nav-logo"><a href="index.html" style="color: inherit; text-decoration: none;">BUECON</a></div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="products.html" class="active">Products</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
    <a href="contact.html" class="nav-cta">Get in Touch</a>
    <button class="nav-hamburger" id="hamburger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <!-- Mobile Menu -->
  <div class="mobile-menu" id="mobileMenu">
    <ul>
      <li><a href="index.html" class="mobile-link">Home</a></li>
      <li><a href="about.html" class="mobile-link">About</a></li>
      <li><a href="products.html" class="mobile-link">Products</a></li>
      <li><a href="contact.html" class="mobile-link">Contact</a></li>
    </ul>
  </div>

  <!-- ═══ PRODUCTS ═══ -->
  <section id="products" style="padding-top: 100px;">
    <div id="products-content"></div>
  </section>

  <!-- ═══ FOOTER ═══ -->
  <footer id="footer">
    <div id="footer-content"></div>
  </footer>

  <!-- ═══ FOCUS MODE OVERLAY ═══ -->
  <div id="focus-overlay" class="focus-overlay">
    <button id="focus-close" class="focus-close" aria-label="Close">✕</button>
    <div class="focus-canvas-wrap">
      <canvas id="focus-canvas"></canvas>
    </div>
    <div class="focus-panel glass-panel">
      <p class="focus-series"></p>
      <h2 class="focus-name"></h2>
      <p class="focus-desc"></p>
      <ul class="focus-features"></ul>
      <div class="focus-actions">
        <a href="contact.html" class="btn-primary" id="focus-inquire">Inquire Now</a>
        <span class="focus-badge">✨ Recommended for You</span>
      </div>
    </div>
  </div>

  <!-- ═══ AI ASSISTANT BUBBLE ═══ -->
  <div class="assistant-bubble" id="assistantBubble">
    <div class="assistant-icon">✦</div>
    <span class="assistant-tooltip">Need help choosing?</span>
    <div class="assistant-panel glass-panel" id="assistantPanel">
      <div class="assistant-header">
        <span class="assistant-dot"></span>
        <p>Style Advisor</p>
        <button class="assistant-close" id="assistantClose">✕</button>
      </div>
      <p class="assistant-question">What's your interior style?</p>
      <div class="style-filters">
        <button class="style-btn active" data-style="modern">Modern</button>
        <button class="style-btn" data-style="minimal">Minimal</button>
        <button class="style-btn" data-style="luxury">Luxury</button>
      </div>
      <p class="assistant-result" id="styleResult">Showing: All collections</p>
    </div>
  </div>

  <!-- ═══ EXTERNAL LIBRARIES ═══ -->
  <script src="js/supabase-client.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

  <!-- ═══ SECTION LOADERS ═══ -->
  <script src="js/data.js"></script>
  <script src="js/product-viewer.js"></script>
  <script src="js/sections/products.js"></script>
  <script src="js/sections/footer.js"></script>
  <script src="js/focus-mode.js"></script>
  <script src="js/assistant.js"></script>
  <script src="js/main.js"></script>

  <script>
    // Load sections
    renderProducts();
    renderFooter();
  </script>

</body>
</html>
